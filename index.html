*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}

header{

.mark{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-.01em;white-space:nowrap}
.mark span{color:var(--blue)}

nav.top a:hover{color:var(--ink)}

main{width:100%;max-width:920px;margin:0 auto;flex:1;padding:46px 24px 90px;animation:in .28s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

footer{width:100%;max-width:920px;margin:0 auto;padding:0 24px 56px;

.k{display:block;font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;color:var(--blue);margin-bottom:8px}
.page-note{color:var(--sub);font-size:13.5px;max-width:560px;margin-bottom:30px}
h1.page{font-family:var(--serif);font-weight:600;font-size:21px;margin-bottom:26px}

.rows{border-top:1px solid var(--line)}
.row{display:grid;grid-template-columns:96px 1fr auto;gap:4px 18px;align-items:baseline;
  padding:15px 2px;border-bottom:1px solid var(--line)}
.row .d{font-family:var(--mono);font-size:12px;color:var(--sub)}
.row .t{font-family:var(--serif);font-size:16.5px;line-height:1.7}
.row .g{font-family:var(--mono);font-size:11px;color:var(--sub);letter-spacing:.06em}
.row:hover .t{color:var(--blue)}

/* ── 첫 화면(프로필) ───────────────────── */
.profile{text-align:center;padding-top:30px}
.pf-photo{width:230px;height:230px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 78px;background:#ecece5}
.pf-names{margin-bottom:66px}
.pf-name{font-family:var(--serif);font-weight:400;font-size:19px;letter-spacing:.04em;margin-bottom:26px}

.facts{border-top:1px solid var(--line);margin-top:6px}

  footer{padding:0 20px 44px}

/* ── 방문록에 옮겨 적은 말들 ──
   메일로 도착한 말 가운데 올리고 싶은 것을 아래에 추가하세요. 맨 위가 최신. */
const GUESTBOOK = [
  { name: "첫 손님", date: "2026-07-08", text: "(예시) 남겨 주신 말은 이런 모습으로 벽에 옮겨 적힙니다." }
];

/* =========================================================
   여기서부터는 화면을 만드는 부분입니다. 고치지 않아도 됩니다.
   ========================================================= */

const SEC = {
  poem:     { label: "시",        short: "시" },
  prose:    { label: "산문·비평", short: "산문" },
  research: { label: "연구",      short: "연구" }
};

const ICONS = {
  instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.2" cy="6.8" r="1.15" fill="currentColor" stroke="none"/></svg>',
  blog: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M4.5 5h15A1.5 1.5 0 0 1 21 6.5v9a1.5 1.5 0 0 1-1.5 1.5h-5.2L12 20l-2.3-3H4.5A1.5 1.5 0 0 1 3 15.5v-9A1.5 1.5 0 0 1 4.5 5Z"/><text x="12" y="13.8" text-anchor="middle" font-size="8.5" font-weight="700" font-family="Arial, sans-serif" fill="currentColor" stroke="none">b</text></svg>'
};

const esc = s => String(s).replace(/[&<>"']/g, c => (
  { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
));

function fmtDate(s){
  if(!s) return "";
  const p = String(s).split("-").map(Number);
  return p.length >= 3 ? `${p[0]}. ${p[1]}. ${p[2]}.` : `${p[0]}. ${p[1] || ""}.`;
}

function renderRows(list){
  return list.map(w =>
    `<a class="row" href="#/w/${esc(w.id)}">
       <span class="d">${fmtDate(w.date)}</span>
       <span class="t">${esc(w.title)}</span>
       <span class="g">${SEC[w.section].short}</span>
     </a>`).join("");
}

function renderHome(){
  const names = PROFILE.names.map(n =>
    `<p class="pf-name${/^[A-Za-z .·-]+$/.test(n) ? " latin" : ""}">${esc(n)}</p>`).join("");
  const roles = PROFILE.roles.map(r => `<p class="pf-role">${esc(r)}</p>`).join("");
  const links = PROFILE.links.map(l =>
    `<a href="${esc(l.url)}" target="_blank" rel="noopener" aria-label="${esc(l.label)}">${ICONS[l.icon] || esc(l.label)}</a>`).join("");
  return `<div class="profile">
    <img class="pf-photo" src="${esc(PROFILE.photo)}" alt="${esc(SITE.author)}의 사진" onerror="this.style.visibility='hidden'">
    <div class="pf-names">${names}</div>
    <div class="pf-roles">${roles}</div>
    <p class="pf-mail"><a href="mailto:${esc(PROFILE.email)}">${esc(PROFILE.email)}</a></p>
    <div class="pf-links">${links}</div>
  </div>`;
}

function renderList(s){
  const list = WORKS.filter(w => w.section === s);
  const body = list.length
    ? `<div class="rows">${renderRows(list)}</div>`
    : `<p class="page-note">아직 올린 글이 없습니다.</p>`;
  return `<h1 class="page">${SEC[s].label}</h1>${body}`;
}

function bodyHtml(w){
  if(w.section === "poem")
    return `<div class="w-body poem">${esc(w.body)}</div>`;
  const ps = w.body.split(/\n{2,}/)
    .map(p => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`).join("");
  return `<div class="w-body prose">${ps}</div>`;
}

function renderWork(w){
  const list = WORKS.filter(x => x.section === w.section);
  const i = list.findIndex(x => x.id === w.id);
  const prev = list[i + 1], next = list[i - 1];
  return `<div class="reader">
    <p class="crumb mono"><a href="#/${w.section}">${SEC[w.section].label}</a></p>
    <h1 class="w-title">${esc(w.title)}</h1>
    <p class="w-meta">${fmtDate(w.date)}${w.meta ? " · " + esc(w.meta) : ""}</p>
    ${bodyHtml(w)}
    ${w.link ? `<a class="wlink" href="${esc(w.link)}" target="_blank" rel="noopener">원문 보기 →</a>` : ""}
    ${w.note ? `<p class="w-note">${esc(w.note)}</p>` : ""}
    <nav class="pn">
      <span>${prev ? `<a href="#/w/${esc(prev.id)}">← ${esc(prev.title)}</a>` : ""}</span>
      <a class="mid" href="#/${w.section}">목록</a>
      <span style="text-align:right">${next ? `<a href="#/w/${esc(next.id)}">${esc(next.title)} →</a>` : ""}</span>
    </nav>
  </div>`;
}

const normIt = it => typeof it === "string" ? { t: it, url: "" } : it;

function renderAbout(){
  const facts = ABOUT.facts.map(f => {
    const v = f.k === "메일"
      ? `<a href="mailto:${esc(f.v)}">${esc(f.v)}</a>`
      : esc(f.v);
    return `<div class="fact"><span class="fk">${esc(f.k)}</span><span class="fv">${v}</span></div>`;
  }).join("");
  const groups = ABOUT.groups.map(g =>
    `<div class="grp">
       <span class="k">${esc(g.h)}</span>
       <div class="grp-list">${g.items.map(raw => {
         const o = normIt(raw);
         return o.url
           ? `<a class="grp-it lk" href="${esc(o.url)}" target="_blank" rel="noopener"><span>${esc(o.t)}</span><span class="arr">↗</span></a>`
           : `<div class="grp-it">${esc(o.t)}</div>`;
       }).join("")}</div>
     </div>`).join("");
  return `<div class="reader">
    <h1 class="w-title">${esc(SITE.author)}</h1>
    <div class="facts">${facts}</div>
    ${groups}
  </div>`;
}

function renderGuest(){
  const items = GUESTBOOK.map(g =>
    `<div class="gb">
       <p class="who">${esc(g.name || "익명")} · ${fmtDate(g.date)}</p>
       <p class="msg">${esc(g.text)}</p>
     </div>`).join("");
  const hint = SITE.guestbookEndpoint ? "" :
    `<p class="hint">보내기를 누르면 메일 창이 열립니다. 도착한 말들을 벽에 옮겨 적는 데에는 하루 이틀이 걸릴 수 있습니다.</p>`;
  return `<div class="reader">
    <h1 class="w-title">방문록</h1>
    <p class="page-note">읽고 가신 자리에 말을 남겨 주세요. 남겨 주신 말은 저에게 전해지고, 그 가운데 몇을 이 벽에 옮겨 적습니다.</p>
    <div class="gb-list">${items}</div>
    <span class="k">말 남기기</span>
    <form class="gbf" id="gbf">
      <input name="name" aria-label="이름" placeholder="이름 (비워 두어도 됩니다)">
      <textarea name="message" aria-label="내용" placeholder="여기에 적어 주세요." required></textarea>
      <button type="submit">보내기</button>
      <p id="gb-status" aria-live="polite"></p>
    </form>
    ${hint}
  </div>`;
}

function gbSubmit(e){
  e.preventDefault();
  const f = e.target;
  const name = f.elements["name"].value.trim();
  const msg  = f.elements["message"].value.trim();
  const st = document.getElementById("gb-status");
  if(!msg){ st.textContent = "내용을 적어 주세요."; return; }
  if(SITE.guestbookEndpoint){
    st.textContent = "보내는 중…";
    fetch(SITE.guestbookEndpoint, {
      method: "POST",
      headers: { "Accept": "application/json", "Content-Type": "application/json" },
      body: JSON.stringify({ 이름: name || "익명", 내용: msg })
    }).then(r => {
      st.textContent = r.ok
        ? "잘 도착했습니다. 남겨 주셔서 고맙습니다."
        : "전송하지 못했습니다. 잠시 후 다시 시도해 주세요.";
      if(r.ok) f.reset();
    }).catch(() => {
      st.textContent = "전송하지 못했습니다. 잠시 후 다시 시도해 주세요.";
    });
  } else {
    location.href = "mailto:" + SITE.email
      + "?subject=" + encodeURIComponent("[방문록] " + (name || "익명"))
      + "&body=" + encodeURIComponent(msg);
    st.textContent = "메일 창이 열렸습니다. 그대로 보내 주시면 됩니다.";
  }
}

/* ── 길 찾기 ── */
const app = document.getElementById("app");

function markNav(key){
  document.querySelectorAll("nav.top a").forEach(a =>
    a.classList.toggle("on", a.dataset.n === key));
}

function route(){
  const seg = location.hash.replace(/^#\/?/, "").split("/");
  let html, ttl = SITE.title, nav = "";
  if(seg[0] === "w" && seg[1]){
    const w = WORKS.find(x => x.id === decodeURIComponent(seg[1]));
    if(w){ html = renderWork(w); ttl = `${w.title} — ${SITE.title}`; nav = w.section; }
    else { html = renderHome(); }
  } else if(SEC[seg[0]]){
    html = renderList(seg[0]); ttl = `${SEC[seg[0]].label} — ${SITE.title}`; nav = seg[0];
  } else if(seg[0] === "about"){
    html = renderAbout(); ttl = `소개 — ${SITE.title}`; nav = "about";
  } else if(seg[0] === "guest"){
    html = renderGuest(); ttl = `방문록 — ${SITE.title}`; nav = "guest";
  } else {
    html = renderHome();
  }
  app.innerHTML = html;
  document.title = ttl;
  markNav(nav);
  window.scrollTo(0, 0);
  const gf = document.getElementById("gbf");
  if(gf) gf.addEventListener("submit", gbSubmit);
}

window.addEventListener("hashchange", route);
route();
</script>
